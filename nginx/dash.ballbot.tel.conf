# ═══════════════════════════════════════════════════════════════
# Nginx — dash.ballbot.tel
# Bliss Hit Agent Dashboard
# Copiar en: /etc/nginx/conf.d/dash.ballbot.tel.conf
# Luego: nginx -t && nginx -s reload
# ═══════════════════════════════════════════════════════════════

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name dash.ballbot.tel;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dash.ballbot.tel;

    # ─── SSL ───────────────────────────────────────────────────
    # Ajustar rutas al certificado (Let's Encrypt o panel hosting)
    ssl_certificate     /etc/letsencrypt/live/dash.ballbot.tel/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dash.ballbot.tel/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── SSE: /events/* — sin buffering ─────────────────────────
    location /events/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ─── API + Health ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        access_log off;
    }

    # ─── Vue 3 SPA (frontend build servido por Express) ─────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ─── Headers de seguridad ────────────────────────────────────
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         DENY always;
    add_header Referrer-Policy         strict-origin-when-cross-origin always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # ─── Logs aislados de este dominio ──────────────────────────
    access_log /var/log/nginx/dash.ballbot.tel.access.log;
    error_log  /var/log/nginx/dash.ballbot.tel.error.log;
}
