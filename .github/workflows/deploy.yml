name: Hitdash Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to BLISS Docker Infrastructure
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ──────────────────────────────────────────────
      - name: 📥 Extraer Código Fuente
        uses: actions/checkout@v5

      # ─── 2. SCP — solo código fuente, sin artefactos ni historial ──
      # Excluimos: node_modules (se instalan en el servidor), dist (se
      # construye en el servidor), .git (historial no necesario en VPS).
      - name: 🚀 Transferir Código Fuente al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 6543
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "src,public,index.html,package*.json,tsconfig*.json,vite.config.*,Dockerfile,docker-compose.yml,.dockerignore"
          target: "/home/ballbottel/dash.ballbot.tel"

      # ─── 3. Forja .env + Migración DB + Build + Despliegue ─────────
      - name: 🛡️ Inyección de Bóveda, Migración y Resurrección Cognitiva
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 6543
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Timeout extendido: build multi-stage puede tardar 3-5 min
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/ballbottel/dash.ballbot.tel

            # ── PASO 1: Forjar .env blindado desde GitHub Secrets ─────
            # Nota: se usa heredoc sin comillas en EOF para que GitHub
            # Actions expanda ${{ secrets.X }} ANTES de enviar el script.
            cat > .env << EOF
            NODE_ENV=production
            PORT=3001

            POSTGRES_USER=hitdash
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=hitdash

            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

            BALLBOT_DATABASE_URL=${{ secrets.BALLBOT_DATABASE_URL }}
            BALLBOT_SSL=${{ secrets.BALLBOT_SSL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}
            VITE_AGENT_API_KEY=${{ secrets.AGENT_API_KEY }}
            EOF

            # Blindaje Unix: solo root puede leer el .env
            chmod 600 .env

            # ── PASO 2: Levantar infraestructura base si no existe ────
            # Postgres y Redis se crean la primera vez; no se tocan si ya existen.
            docker compose up -d hitdash-postgres hitdash-redis

            # Esperar hasta que Postgres esté healthy (máx 60s)
            echo "⏳ Esperando a PostgreSQL..."
            timeout 60 bash -c \
              'until docker compose exec -T hitdash-postgres pg_isready -U hitdash -d hitdash -q; do sleep 2; done'
            echo "✅ PostgreSQL listo"

            # ── PASO 3: Construir imagen sin caché ────────────────────
            # CRÍTICO: build ANTES de migraciones — la imagen nueva contiene
            # el JS compilado (dist-server/agent/db/migrate.js) que se ejecutará
            # en el siguiente paso. Orden invertido = migraciones con imagen vieja.
            echo "🔨 Construyendo imagen hitdash-server..."
            docker compose build --no-cache hitdash-server

            # ── PASO 4: Ejecutar migraciones SQL con imagen nueva ─────
            # Ejecuta el migrate.js ya compilado en Stage 2 del Dockerfile.
            # Migrate v2.0: auto-descubre archivos + verifica integridad post-run.
            #
            # IMPORTANTE — patrón de captura SIN suprimir output:
            #   `set +e` antes / `set -e` después para no abortar prematuramente.
            #   tee a /tmp/migrate-output.log → stream live + archivo grep-able.
            #   PIPESTATUS[0] captura exit code real del docker (no del tee).
            echo "🔄 Ejecutando migraciones de schema..."
            set +e
            docker compose run --rm \
              -e AGENT_DATABASE_URL="postgresql://hitdash:${{ secrets.POSTGRES_PASSWORD }}@hitdash-postgres:5432/hitdash" \
              hitdash-server \
              node dist-server/agent/db/migrate.js 2>&1 | tee /tmp/migrate-output.log
            MIGRATE_EXIT=${PIPESTATUS[0]}
            set -e

            if [ "$MIGRATE_EXIT" -ne 0 ]; then
              echo ""
              echo "════════════════════════════════════════════════════════════════"
              echo "❌ MIGRACIÓN FALLÓ con exit code $MIGRATE_EXIT"
              echo "════════════════════════════════════════════════════════════════"
              echo "Últimas 100 líneas del log de migración:"
              tail -100 /tmp/migrate-output.log || true
              echo "════════════════════════════════════════════════════════════════"
              echo "Estado actual de hitdash.schema_migrations en BD:"
              docker compose exec -T hitdash-postgres psql -U hitdash -d hitdash -c \
                "SELECT filename, applied_at FROM hitdash.schema_migrations ORDER BY filename;" 2>&1 | tail -30 || \
                echo "(no se pudo conectar a BD para inspeccionar)"
              echo "════════════════════════════════════════════════════════════════"
              exit 1
            fi

            # Verificación de integridad: el reporte JSON al final debe tener in_sync=true
            if ! grep -q '"in_sync":true' /tmp/migrate-output.log; then
              echo "❌ Migraciones NO están en sync con filesystem. Abortando deploy."
              tail -30 /tmp/migrate-output.log
              exit 1
            fi
            echo "✅ Migraciones completadas e in-sync verificado"

            # ── PASO 4.5: VACUUM FULL post-tabula-rasa (2026-05-21) ────
            # Migration 034 TRUNCATÓ ~6 GB en backtest_points_v2 + tablas
            # cognitivas contaminadas. PostgreSQL marca páginas como "free"
            # pero no recupera el disco hasta VACUUM FULL. Como las tablas
            # acaban de ser truncadas, el lock es instantáneo.
            # Idempotente: si las tablas ya están vacías, no-op.
            echo "🧹 VACUUM FULL post-tabula-rasa (reclamar espacio en disco)..."
            docker compose exec -T hitdash-postgres psql -U hitdash -d hitdash -c \
              "VACUUM FULL hitdash.backtest_points_v2;
               VACUUM FULL hitdash.algo_prediction_snapshot;
               VACUUM FULL hitdash.helix_retrospective_runs;" 2>&1 | tail -5 \
              && echo "✅ VACUUM completado" || echo "⚠️  VACUUM no completado (no crítico)"

            # ── PASO 5: Desplegar el servidor (zero-downtime) ─────────
            # Hitdash expone el puerto 3005 del host (→ 3001 interno).
            # bliss-api ocupa el 3001 del host — bóvedas separadas, sin colisión.
            # --force-recreate garantiza reemplazo del contenedor anterior.
            # --no-deps protege Postgres y Redis (memoria permanente del agente).
            docker compose up -d --force-recreate --no-deps hitdash-server

            # ── PASO 6: Validar que el servidor arrancó correctamente ─
            # Health check apunta al puerto 3005 del host (mapping 3005→3001).
            echo "⏳ Validando arranque del servidor (máx 60s)..."
            timeout 60 bash -c \
              'until curl -sf http://localhost:3005/health > /dev/null; do sleep 3; done' \
              && echo "✅ Servidor respondiendo en /health" \
              || (echo "❌ El servidor no respondió — últimos logs:" && docker compose logs --tail=50 hitdash-server && exit 1)

            # ── PASO 6.5: Genesis Backtest — poblar Accuracy + Rendimiento ─
            # Fire-and-forget: el job corre async en el server, no bloqueamos el pipeline.
            # Garantiza que los gráficos muestren datos reales en el primer login.
            #
            # DEPLOY FIX (2026-05-21): Lista actualizada para coincidir EXACTAMENTE con
            # STRATEGY_CATALOG en backtestJobRunner.ts (13 estrategias válidas).
            # Las 8 anteriores (pair_return_cycle, sum_pattern_filter, double_triple_detector,
            # cross_draw_correlation, trend_momentum, trend_momentum_sweet, est_individuales,
            # terminal_analysis) no están en STRATEGY_CATALOG → API retornaba 400 →
            # genesis fallaba silenciosamente desde siempre.
            echo "📊 Disparando Genesis Backtest (pick3 + pick4, 90 días)..."
            ALL_STRATS='["frequency_rank","gap_overdue_focus","hot_cold_weighted","streak_reversal","pair_correlation","position_bias","moving_avg_signal","bayesian_score","transition_follow","markov_order2","calendar_pattern","decade_family","max_per_weekday"]'
            curl -sf -X POST "http://localhost:3005/api/backtest-control/run" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${{ secrets.AGENT_API_KEY }}" \
              -d "{\"game_type\":\"pick3\",\"mode\":\"combined\",\"top_n\":15,\"strategies\":$ALL_STRATS}" \
              && echo "✅ Genesis pick3 encolado" || echo "⚠️  Genesis pick3 no encolado (no crítico)"
            curl -sf -X POST "http://localhost:3005/api/backtest-control/run" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${{ secrets.AGENT_API_KEY }}" \
              -d "{\"game_type\":\"pick4\",\"mode\":\"combined\",\"top_n\":15,\"strategies\":$ALL_STRATS}" \
              && echo "✅ Genesis pick4 encolado" || echo "⚠️  Genesis pick4 no encolado (no crítico)"

            # ── PASO 6.55: Edge Discovery Engine (autonomous statistical proof) ─
            # HELIX F1 = aprendizaje adaptativo autónomo didáctico.
            # Corre 6 familias de tests + Bonferroni. Reporta verdad sin maquillaje.
            echo "🔬 Disparando Edge Discovery Engine (autonomous truth)..."
            EDGE_RUN_ID="edge-deploy-$(date -u +%Y%m%dT%H%M%S)"
            curl -sf -X POST "http://localhost:3005/api/agent/edge-discovery/run" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${{ secrets.AGENT_API_KEY }}" \
              -d "{\"run_id\":\"$EDGE_RUN_ID\",\"scope\":\"all\"}" \
              && echo "✅ Edge Discovery iniciado run_id=$EDGE_RUN_ID" || echo "⚠️  Edge Discovery no iniciado"

            # ── PASO 6.6: HELIX v2 Walk-Forward Retrospective (2026-05-21) ─
            # Respuesta a inversores: replay del pipeline completo sobre 5 años.
            # POST /retrospective/helix-v2/run-all dispara los 6 combos secuencial.
            # Fire-and-forget — el simulador corre async en el server.
            # Es la PRUEBA AUDITABLE del edge sostenido históricamente.
            echo "🧬 Disparando HELIX v2 Walk-Forward Retrospective (5 años, 6 combos)..."
            RUN_ID="helix-v2-deploy-$(date -u +%Y%m%dT%H%M%S)"
            curl -sf -X POST "http://localhost:3005/api/agent/retrospective/helix-v2/run-all" \
              -H "Content-Type: application/json" \
              -H "X-API-Key: ${{ secrets.AGENT_API_KEY }}" \
              -d "{\"top_n\":15,\"run_id\":\"$RUN_ID\"}" \
              && echo "✅ Walk-forward iniciado run_id=$RUN_ID" || echo "⚠️  Walk-forward no iniciado (no crítico)"

            # ── PASO 7: Extraer Assets para Nginx (Bypass Cache) ──────
            # En alojamiento con panel cPanel/Nginx, Nginx intercepta .js/.css
            # Si no están físicamente en el disco host, devuelve 404 ignorando Apache.
            echo "📂 Extrayendo assets visuales al host para Nginx..."
            docker cp hitdash-server:/app/dist/. /home/ballbottel/dash.ballbot.tel/

            # ── PASO 8: Limpieza de imágenes huérfanas ────────────────
            docker image prune -f

            echo "🚀 Despliegue SecOps completado. Sistema Hitdash operativo."
